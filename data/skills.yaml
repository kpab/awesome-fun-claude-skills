# Single source of truth for the awesome-fun-claude-skills list.
# README.md is GENERATED from this file — never edit README.md by hand.
#
# Listing policy: GitHub repos only (skills / plugins / Claude Code-integrated toys).
# Article-only skills (Zenn/Qiita/blogs) are NOT listed — if an article has a repo,
# link the repo. Quality first: stars, reproducibility, and how fun it is.
#
# Schema:
#   categories: ordered list; order here = section order in README
#     - id:          slug, referenced by skills[].category
#       name:        section heading (English)
#       description: one line under the heading (English)
#   skills: order within a category = display order in README (curation order:
#           high-star / high-quality first)
#     - name:        display name
#       url:         GitHub repository URL
#       source:      repo
#       category:    one of categories[].id
#       language:    primary language of the repo/README (en, ja, zh, ko, ...)
#       description: 1-2 sentences in English; make the "fun" obvious
#       author:      GitHub handle (optional)
#       tags:        optional list of extra keywords

categories:
  - id: personas
    name: Personas & Characters
    description: Skills that turn Claude into someone (or something) else entirely.
  - id: jokes
    name: Jokes & Humor
    description: Skills about making, engineering, or delivering laughs.
  - id: play
    name: Games & Play
    description: Skills that make Claude a playmate rather than a coworker.

